# Trust ADR Phase 5 Session D — Release workflow for validator backends.
#
# On a signed-tag push (``v*``), build each validator backend image
# with full supply-chain provenance:
#
# 1. **OIDC build attestation** — ``actions/attest-build-provenance``
#    produces a sigstore-style attestation linking the image digest
#    to *this exact* GitHub Actions run. Verifiers running
#    ``VALIDATOR_BACKEND_IMAGE_POLICY=signed-digest`` against a
#    deployment can then check the image was built by Validibot CI
#    via ``gh attestation verify``.
# 2. **SBOM (SPDX)** — ``docker/build-push-action`` with
#    ``sbom: true`` embeds a SPDX SBOM into the OCI image manifest
#    via BuildKit's attestation API. The SBOM is also extracted and
#    attached to the GitHub Release for tools that prefer fetching
#    SBOMs from a release page rather than the registry.
# 3. **Signed-tag verification** — the workflow refuses to build if
#    the triggering tag is unsigned. Combined with branch protection,
#    this means the only way to push a release image is from a
#    maintainer's signed commit.
#
# Default registry: GitHub Container Registry (GHCR)
# ===================================================
#
# Validibot's open-core promise is "free for everyone." Validator
# backend images are part of that promise — anyone running self-hosted
# community Validibot must be able to ``docker pull`` an official
# image without paying for a third party's registry egress.
#
# GHCR is free for public images, has no rate limit on anonymous
# pulls of public artefacts, lives in the same GitHub org as the
# repo, and authenticates via the ambient ``GITHUB_TOKEN`` — no
# extra secrets required for the default path.
#
# Image references published per release:
#
#     ghcr.io/<owner>/validibot-validator-backend-<validator>:vX.Y.Z
#     ghcr.io/<owner>/validibot-validator-backend-<validator>:latest
#
# Optional secondary push: Google Artifact Registry (GAR)
# ========================================================
#
# Cloud (validibot.com) prefers running validator backend images out
# of a private GAR repo for deploy-time reasons (latency to Cloud Run
# Jobs, billing, IAM). When the operator configures the GAR variables
# below, the workflow *also* pushes the same digest to GAR after the
# GHCR push succeeds. The GHCR copy remains the public source of
# truth; GAR is a deployment-channel mirror.
#
# Optional GAR configuration (when set, the secondary push fires;
# when missing, the GHCR-only path is the whole release):
#
#   Variables:
#     GCP_PROJECT_ID
#     GCP_REGION
#     GCP_GAR_REPOSITORY
#   Secrets:
#     GCP_WORKLOAD_IDENTITY_PROVIDER
#     GCP_SERVICE_ACCOUNT_EMAIL
#
# When the GAR vars/secrets are unset, the workflow skips the GAR
# step cleanly — the expected state for a fresh fork or a
# community-only operator who doesn't need a private mirror.

name: Release validator backend images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-signed-tag:
    name: Verify tag signature and create release
    runs-on: ubuntu-latest
    permissions:
      # ``contents: write`` lets us create the GitHub release that
      # the parallel matrix jobs below will attach SBOMs to. Doing
      # this once here (before the matrix) avoids the race
      # condition that would happen if each matrix job tried to
      # create the release in parallel.
      contents: write

    steps:
      - name: Checkout (full history for tag verification)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      # Configure git so ``git verify-tag`` knows where the
      # repo's allowed-signers file lives. Without this step,
      # ``git verify-tag`` fails with "gpg.ssh.allowedSignersFile
      # needs to be configured" because git defaults to GPG
      # signature verification on a fresh CI runner.
      - name: Configure git for SSH signature verification
        run: |
          if [ -f .allowed_signers ]; then
            git config gpg.ssh.allowedSignersFile "$PWD/.allowed_signers"
            git config gpg.format ssh
          else
            echo "::error::Repo is missing .allowed_signers; cannot verify signed tags."
            exit 1
          fi

      # Trust ADR Phase 5 Session D — refuse unsigned tags. The
      # check fails when ``git verify-tag`` exits non-zero, which
      # happens for unsigned tags or tags signed by a key not in
      # the repo's allowed-signers config.
      #
      # ``TAG_REF`` is bound via env (not interpolated into the
      # script body) — recommended practice for any input from a
      # GitHub event payload.
      - name: Verify tag is signed
        env:
          TAG_REF: ${{ inputs.tag || github.ref_name }}
        run: |
          if ! git verify-tag "$TAG_REF" 2>&1; then
            echo "::error::Tag '$TAG_REF' is not signed."
            echo "Sign with: git tag -s '$TAG_REF' -m 'release notes'"
            echo "Or use the maintainer recipe: just release X.Y.Z"
            exit 1
          fi
          echo "Tag '$TAG_REF' signature verified."

      # Create the GitHub release here (idempotent) so the
      # parallel matrix jobs can ``gh release upload`` SBOM files
      # without having to coordinate creation.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi

  build-and-publish:
    name: Build, sign, and push ${{ matrix.validator }}
    needs: verify-signed-tag
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling matrix jobs when one fails — operators
      # debugging a release want to see all the failure modes at once.
      fail-fast: false
      matrix:
        validator: [energyplus, fmu]

    permissions:
      # Required for OIDC token exchange (used by GHCR push, GCP
      # WIF auth, AND the build-provenance attestation step).
      id-token: write
      # Required for ``actions/attest-build-provenance`` to write
      # attestations to the repo's transparency log.
      attestations: write
      # Required for the SBOM upload step at the end.
      contents: write
      # Required to push images to GHCR.
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # ── Primary registry: GHCR (always pushed) ────────────────────
      #
      # GHCR auth uses the ambient GITHUB_TOKEN — no operator-
      # provided secret needed. The repo-owner namespace is derived
      # from ``github.repository_owner`` so forks publish under
      # their own namespace automatically.
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image references
        id: image-ref
        env:
          OWNER: ${{ github.repository_owner }}
          VALIDATOR: ${{ matrix.validator }}
          TAG_REF: ${{ inputs.tag || github.ref_name }}
        run: |
          # GHCR namespace requires lower-case owner; normalise.
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/validibot-validator-backend-${VALIDATOR}"
          {
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "tag=${TAG_REF}"
            echo "ghcr_full_ref=${GHCR_IMAGE}:${TAG_REF}"
          } >> "$GITHUB_OUTPUT"

      # Trust ADR Phase 5 Session D — single build that emits the
      # image, an OCI-attached SBOM (SPDX), and BuildKit provenance.
      # ``attest-build-provenance`` (next step) layers the
      # sigstore-signed attestation on top of the digest this step
      # outputs.
      - name: Build and push to GHCR with SBOM
        id: build-push-ghcr
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: validator_backends/${{ matrix.validator }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image-ref.outputs.ghcr_full_ref }}
            ${{ steps.image-ref.outputs.ghcr_image }}:latest
          # SLSA build provenance and SBOM as image-attached
          # attestations — verifiers running
          # ``cosign verify-attestation`` can pull both from the
          # registry alongside the image digest.
          provenance: mode=max
          sbom: true

      - name: Generate sigstore attestation for GHCR image digest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ${{ steps.image-ref.outputs.ghcr_image }}
          subject-digest: ${{ steps.build-push-ghcr.outputs.digest }}
          push-to-registry: true

      # ── Optional secondary registry: Google Artifact Registry ─────
      #
      # When the operator has set the GAR variables and secrets, the
      # workflow also publishes the same image digest to a private
      # GAR repo (e.g. for cloud's deploy-time pulls). The
      # ``actions/attest-build-provenance`` already wrote the
      # sigstore attestation against the GHCR digest, but since the
      # image bytes are identical (same build, same digest) the same
      # attestation verifies for the GAR copy too.
      #
      # The ``if: vars.GCP_PROJECT_ID != ''`` gate makes this step a
      # no-op for forks / community operators who only want the GHCR
      # path.
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: vars.GCP_PROJECT_ID != ''
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        if: vars.GCP_PROJECT_ID != ''
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Mirror image from GHCR to GAR
        if: vars.GCP_PROJECT_ID != ''
        env:
          GHCR_IMAGE: ${{ steps.image-ref.outputs.ghcr_image }}
          GHCR_DIGEST: ${{ steps.build-push-ghcr.outputs.digest }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_GAR_REPOSITORY: ${{ vars.GCP_GAR_REPOSITORY }}
          VALIDATOR: ${{ matrix.validator }}
          TAG_REF: ${{ inputs.tag || github.ref_name }}
        run: |
          GAR_REGISTRY="${GCP_REGION}-docker.pkg.dev"
          GAR_IMAGE="${GAR_REGISTRY}/${GCP_PROJECT_ID}/${GCP_GAR_REPOSITORY}/validibot-validator-backend-${VALIDATOR}"
          # ``crane`` copies the image manifest + layers verbatim,
          # preserving the digest. Re-pushing via ``docker push``
          # would rebuild and the digest would drift; crane is the
          # right tool for "same bytes, different registry."
          curl -sSfL https://github.com/google/go-containerregistry/releases/download/v0.20.6/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin crane
          crane copy \
            "${GHCR_IMAGE}@${GHCR_DIGEST}" \
            "${GAR_IMAGE}:${TAG_REF}"
          crane copy \
            "${GHCR_IMAGE}@${GHCR_DIGEST}" \
            "${GAR_IMAGE}:latest"

      # ── SBOM extraction + release page upload (always runs) ───────

      # Generate a SPDX SBOM from the published image. Earlier
      # iterations of this workflow tried to extract the SBOM that
      # ``docker/build-push-action`` attaches to the OCI image
      # manifest (via ``sbom: true``), but ``docker buildx imagetools
      # inspect``'s ``--format`` template syntax for SBOM access is
      # unstable across buildx versions. ``anchore/sbom-action`` runs
      # Syft against the image and produces a clean SPDX file —
      # purpose-built for this and stable across buildx changes.
      #
      # The OCI-attached SBOM (from ``sbom: true`` on the build-push
      # step) is still present in the image manifest; this step
      # just produces a *separate* convenience file for the GitHub
      # release page that doesn't require operators to query the
      # registry.
      - name: Generate SPDX SBOM from image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ steps.image-ref.outputs.ghcr_full_ref }}
          format: spdx-json
          output-file: validibot-validator-backend-${{ matrix.validator }}.spdx.json
          upload-artifact: false  # Our own upload-artifact step below handles this.

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ matrix.validator }}
          path: validibot-validator-backend-${{ matrix.validator }}.spdx.json
          retention-days: 90

      - name: Attach SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          VALIDATOR: ${{ matrix.validator }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "validibot-validator-backend-${VALIDATOR}.spdx.json" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
